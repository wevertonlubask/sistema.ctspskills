version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ct_spskills_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ct_spskills}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ct_spskills_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ct_spskills_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ct_spskills_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ct_spskills_app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ct_spskills}
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ct_spskills_network
    command: uvicorn src.presentation.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  pgadmin_data:

networks:
  ct_spskills_network:
    driver: bridge
